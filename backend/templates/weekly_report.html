<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 700px; margin: 0 auto; padding: 20px; }
        h2 { color: #4338ca; border-bottom: 2px solid #4338ca; padding-bottom: 8px; }
        h3 { color: #1e293b; margin-top: 24px; }
        .content { white-space: pre-wrap; }
        .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>
    <h2>Weekly Summary - {{ week_start }} to {{ week_end }}</h2>
    <div class="content">{{ content }}</div>
    <div class="footer">
        Generated by PM Update Tool
    </div>
</body>
</html>
