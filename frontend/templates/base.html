<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{% block title %}PM Update Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .nav-link { transition: background-color 0.2s; }
        .nav-link:hover { background-color: rgba(255,255,255,0.1); }
        .nav-link.active { background-color: rgba(255,255,255,0.2); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-bubble { max-width: 80%; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2">
                    <span class="text-xl font-bold">PM Update Tool</span>
                </div>
                <div class="flex items-center space-x-1">
                    <a href="/" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
                    <a href="/chat" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'chat' %}active{% endif %}">Chat</a>
                    <a href="/projects-page" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'projects' %}active{% endif %}">Projects</a>
                    <a href="/team-page" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'team' %}active{% endif %}">Team</a>
                    <a href="/reports-page" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'reports' %}active{% endif %}">Reports</a>
                    <a href="/reminders-page" class="nav-link relative px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'reminders' %}active{% endif %}">
                        Reminders
                        <span id="reminder-badge"
                              hx-get="/api/reminders/count"
                              hx-trigger="load, every 60s"
                              hx-swap="innerHTML"
                              hx-target="#reminder-badge-count"
                              class="absolute -top-1 -right-1">
                            <span id="reminder-badge-count"></span>
                        </span>
                    </a>
                    <a href="/settings-page" class="nav-link px-3 py-2 rounded-md text-sm font-medium {% if active_page == 'settings' %}active{% endif %}">Settings</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Format reminder badge count
        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.target.id === 'reminder-badge-count') {
                try {
                    const data = JSON.parse(event.detail.target.innerText);
                    if (data.count > 0) {
                        event.detail.target.innerHTML = '<span class="bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">' + data.count + '</span>';
                    } else {
                        event.detail.target.innerHTML = '';
                    }
                } catch(e) {}
            }
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
